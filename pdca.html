<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>マイチャンネルPDCA</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#0b1018;color:#d8e3f0}
.hd{background:#0f1824;border-bottom:1px solid #1e2c3c;padding:14px 24px;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hd h1{font-size:16px;color:#f0f6fc;font-weight:700}
.hd .meta{font-size:11px;color:#5a7088;margin-top:2px}
.btns{display:flex;gap:5px;flex-wrap:wrap}
.btn{background:#13202e;color:#7ab8ff;border:1px solid #25405c;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px}
.btn:hover{background:#1a2e42}
.sb{background:#0d1622;border-bottom:1px solid #18242f;padding:10px 24px;position:sticky;top:53px;z-index:200;display:flex;align-items:center;gap:8px}
.sb input{flex:1;background:#101c28;border:1px solid #22364a;color:#eaf1f8;padding:7px 13px;border-radius:6px;font-size:13px;outline:none}
.sb input:focus{border-color:#3b82f6}
.sb input::placeholder{color:#44566a}
.sc{font-size:11px;color:#5a7088;min-width:70px;white-space:nowrap}
.hd-select{background:#13202e;color:#7ab8ff;border:1px solid #25405c;padding:5px 9px;border-radius:5px;cursor:pointer;font-size:11px;outline:none;color-scheme:dark}
.hd-select:hover{background:#1a2e42}
.hd-date{background:#13202e;color:#cde;border:1px solid #25405c;padding:4px 7px;border-radius:5px;font-size:11px;color-scheme:dark;outline:none}
.menu-btn{background:#13294a!important;color:#7ab8ff!important;border-color:#2f4a6a!important;font-weight:700}
.menu-btn:hover{background:#1a3a5c!important}
/* 📂 カテゴリージャンプ サイドバー */
.sidebar-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600}
.sidebar-ov.open{display:block}
.sidebar{position:fixed;top:0;left:0;width:300px;max-width:82vw;height:100vh;background:#0f1824;border-right:1px solid #1e2c3c;z-index:601;transform:translateX(-100%);transition:transform .22s ease;overflow-y:auto;padding-bottom:30px}
.sidebar.open{transform:translateX(0)}
.sidebar-head{font-size:14px;font-weight:800;color:#f0f6fc;padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0f1824;border-bottom:1px solid #1a2c40}
.sidebar-close{cursor:pointer;color:#7d93a8;font-size:16px;padding:0 4px}
.sidebar-close:hover{color:#fff}
.side-group-title{font-size:10px;color:#5e7c9a;text-transform:uppercase;letter-spacing:1px;padding:14px 18px 5px}
.side-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 18px;color:#cdd9e5;font-size:13px;cursor:pointer;transition:background .12s}
.side-item:hover{background:#1a2e42;color:#fff}
.side-item.side-all{color:#7ab8ff;font-weight:700;border-bottom:1px solid #1a2c40;padding:11px 18px}
.side-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-cnt{font-size:11px;color:#5e7c9a;background:#13202e;border:1px solid #1e2c3c;border-radius:9px;padding:1px 7px;flex-shrink:0}
.side-app{font-weight:700;color:#7ab8ff;margin-top:3px}
.side-sub{padding-left:34px;font-size:12px;color:#9fb2c6}
.side-sub .side-name{position:relative}
.side-sub .side-name::before{content:'└ ';color:#3f5670}
#period-custom{font-size:11px;color:#7d93a8;display:inline-flex;align-items:center;gap:4px}
.sc.hit{color:#60a5fa}.sc.miss{color:#ef6a6a}
.sbtn{background:none;border:1px solid #22364a;color:#6a8099;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.sbtn:hover{color:#cdd9e5;border-color:#2f4a6a}
.toc{background:#0c1420;padding:12px 24px;border-bottom:1px solid #16222e;display:flex;flex-wrap:wrap;gap:5px}
.toc a{color:#8197ad;font-size:12px;text-decoration:none;background:#13202e;border:1px solid #1e2c3c;padding:3px 10px;border-radius:12px}
.toc a:hover{color:#f0f6fc;background:#1a2e42}
.cs{border-bottom:1px solid #16222e}
.ch{background:#0f1824;padding:13px 24px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--ac,#3b82f6)}
.ch:hover{background:#13202e}
.ct{font-size:14px;font-weight:600;color:#f0f6fc}
.cd{font-size:11px;color:#5a7088;margin-top:2px}
.cc{font-size:11px;color:#7d93a8;background:#15202e;padding:2px 8px;border-radius:10px}
.cv{color:#44566a;font-size:13px;margin-left:8px;transition:transform .2s}
.cb{display:none;padding:18px 24px}
.cb.open{display:block}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px}
.card{background:#131f2e;border:1px solid #1e2c3c;border-radius:8px;overflow:hidden}
.card.hidden{display:none}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;cursor:pointer;transition:opacity .15s}
.card img:hover{opacity:.85}
.cdb{padding:11px}
.cdtitle{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:6px}
a.tl{color:#eaf1f8;text-decoration:none}
a.tl:hover{color:#7ab8ff;text-decoration:underline}
.cdmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;color:#7d93a8;margin-bottom:7px}
.views{color:#6aa8f5;font-weight:700}
.ch2{background:#15202e;padding:2px 6px;border-radius:3px;color:#8197ad}
a.ch2-link{text-decoration:none;cursor:pointer;transition:all .15s;color:#7ab8ff}
a.ch2-link:hover{background:#1a3a5c;color:#9fd0ff}
/* 字幕トグル */
.thumb-text-wrap{margin-bottom:6px}
.thumb-text{font-size:11px;color:#8bc0ff;background:#101e30;border:1px solid #243a52;border-radius:4px;padding:4px 8px;line-height:1.6;user-select:text;cursor:text;transition:border-color .15s}
.thumb-text:hover{border-color:#3b82f6;background:#13263c}
.thumb-empty{color:#3f5670;font-style:italic}
.thumb-text-editing{display:none}
.thumb-edit-area{width:100%;background:#13263c;border:1px solid #3b82f6;color:#cfe0f5;padding:5px 8px;border-radius:4px;font-size:11px;line-height:1.6;resize:vertical;min-height:48px;outline:none;font-family:inherit}
.thumb-edit-btns{display:flex;gap:5px;margin-top:4px}
.thumb-save-btn{background:#1d4ed8;color:#fff;border:1px solid #2563eb;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.thumb-save-btn:hover{background:#2563eb}
.thumb-cancel-btn{background:none;color:#6a8099;border:1px solid #243349;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.thumb-cancel-btn:hover{color:#cdd9e5;border-color:#2f4a6a}
.tb{width:100%;background:#0f1824;border:1px solid #22364a;color:#7d93a8;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:0;transition:background .15s,color .15s}
.tb:hover:not([disabled]){background:#15202e;color:#cdd9e5;border-color:#2f4a6a}
.tb[disabled]{opacity:.35;cursor:default}
.arr{transition:transform .2s;display:inline-block}
.tb.open .arr{transform:rotate(180deg)}
/* 字幕本文 */
.tc{display:none;margin-top:6px;font-size:12px;color:#b7c6d6;line-height:1.85;background:#0c1420;padding:10px;border-radius:5px;border-left:2px solid #243349;max-height:500px;overflow-y:auto}
.tc.open{display:block}
.tc.no-t{color:#3f5670;font-style:italic}
/* カテゴリ変更ボタン */
.cat-btn{margin-top:7px;width:100%;background:none;border:1px dashed #243349;color:#5a7088;padding:5px;border-radius:5px;cursor:pointer;font-size:11px;text-align:center}
.cat-btn:hover{background:#15202e;color:#9fb2c6;border-color:#2f4a6a}
/* カテゴリ変更モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#101a26;border:1px solid #243349;border-radius:10px;padding:20px;width:360px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h3{font-size:14px;color:#f0f6fc;margin-bottom:4px}
.modal .sub{font-size:11px;color:#7d93a8;margin-bottom:14px}
.cat-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#cdd9e5;border:1px solid transparent}
.cat-option:hover{background:#1a2838;border-color:#2f4a6a}
.cat-option.current{border-color:#3b82f6;color:#7ab8ff;background:#11233a}
.modal-close{margin-top:12px;width:100%;background:#1a2838;border:none;color:#9fb2c6;padding:8px;border-radius:6px;cursor:pointer;font-size:12px}
.modal-close:hover{background:#243349}
.override-badge{display:inline-block;font-size:10px;color:#7ab8ff;background:#11233a;border:1px solid #25405c;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
/* チャンネルフィルター */
.ch-filter-bar{background:#0a121c;border-bottom:1px solid #16222e;padding:10px 24px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.ch-filter-label{font-size:11px;color:#5a7088;margin-right:4px;white-space:nowrap}
.ch-chip{background:#13202e;border:1px solid #1e2c3c;color:#8197ad;font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.ch-chip:hover{background:#1a2e42;color:#cdd9e5;border-color:#2f4a6a}
.ch-chip.active{background:#11233a;color:#7ab8ff;border-color:#2f4a6a;font-weight:600}
.ch-chip .cnt{font-size:10px;color:#5a7088;margin-left:3px}
.ch-chip.active .cnt{color:#60a5fa}
/* 📺 チャンネル一覧（カード型・最上部） */
.chan-section{background:#0c1320;border-bottom:2px solid #16273a}
.chan-headbar{padding:13px 24px 4px}
.chan-title{font-size:16px;font-weight:800;color:#6aa8f5}
.chan-sub{font-size:11px;color:#5e7c9a;margin-left:12px}
.chan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:10px;padding:14px 24px}
.chan-card{background:#101c2a;border:1px solid #1c2e42;border-radius:8px;padding:11px 13px;cursor:pointer;transition:all .15s}
.chan-card:hover{border-color:#2f4a6a;background:#13243a}
.chan-card.active{border-color:#2563eb;background:#11233a;box-shadow:0 0 0 1px #1d4ed8 inset}
.chan-name{font-size:13px;font-weight:700;color:#e8eef5;line-height:1.4;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chan-stats{display:flex;flex-wrap:wrap;gap:9px;align-items:baseline;font-size:11px;color:#6a8099}
.chan-stats b{font-size:15px;color:#6aa8f5;font-weight:800}
/* セクション開閉トグル（ランキング/検索） */
.sec-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.sec-head:hover{background:rgba(255,255,255,.02)}
.sec-toggle{font-size:12px;color:#7ab8ff;background:#13294a;border:1px solid #25405c;padding:4px 12px;border-radius:6px;white-space:nowrap;margin-right:24px}
.trend-collapse.collapsed,.srch-collapse.collapsed{display:none}
/* 📊 カテゴリー別 / 📲 アプリ別 グループ（折りたたみ） */
.cat-group{border-bottom:2px solid #16273a}
.cat-group-head{padding:14px 24px;background:#0f1c2c;border-bottom:1px solid #1a3048}
.cat-group-head:hover{background:#11233a}
.cat-group-title{font-size:16px;font-weight:800;color:#6aa8f5}
.cat-group-sub{font-size:11px;color:#5e7c9a;margin-left:12px}
.cat-group-body.collapsed{display:none}
.sub-cs{margin:0 0 6px 0}
.sub-ch{background:#0c1420!important;border-left-width:2px!important}
.sub-ch:hover{background:#0f1824!important}
.sub-cs .cb{padding:12px 16px}
.cs.search-empty .ch{opacity:.25;pointer-events:none}
.cs.search-empty .cb{display:none!important}
/* カスタムカテゴリ作成UI */
.new-cat-bar{background:#0c1420;border-bottom:1px solid #16222e;padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.new-cat-bar span{font-size:12px;color:#5a7088}
.new-cat-bar input{background:#13202e;border:1px solid #22364a;color:#eaf1f8;padding:6px 10px;border-radius:5px;font-size:12px;outline:none;width:200px}
.new-cat-bar input:focus{border-color:#3b82f6}
.new-cat-bar input::placeholder{color:#44566a}
.add-cat-btn{background:#13294a;color:#7ab8ff;border:1px solid #25405c;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px}
.add-cat-btn:hover{background:#1a3a5c}
.cs.custom .ch{border-left-color:#3b82f6}
.del-cat-btn{background:none;border:1px solid #3a2230;color:#7d93a8;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;margin-left:6px}
.del-cat-btn:hover{border-color:#ef6a6a;color:#ef6a6a}
/* 🎯 チャンス企画ランキング */
.opp-section{background:linear-gradient(180deg,#0f1c2c,#0b1018);border-bottom:2px solid #1d3450}
.opp-banner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;cursor:pointer;border-bottom:1px solid #1d3450}
.opp-banner:hover{background:#101e30}
.opp-title{font-size:16px;font-weight:800;color:#6aa8f5}
.opp-sub{font-size:11px;color:#5e7c9a;margin-left:12px}
.opp-toggle{font-size:12px;color:#7ab8ff;background:#13294a;border:1px solid #25405c;padding:4px 12px;border-radius:6px;white-space:nowrap}
.opp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;padding:18px 24px}
.opp-grid.collapsed{display:none}
.opp-card{background:#101c2c;border:1px solid #213750;border-radius:10px;padding:14px}
.opp-card.top3{border-color:#2563eb;box-shadow:0 0 0 1px #1a3a66 inset;background:#11223a}
.opp-card.top10{border-color:#1e3a5a}
.opp-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.opp-rank{font-size:18px;font-weight:900;color:#6aa8f5;min-width:42px}
.opp-card.top3 .opp-rank{color:#93c5fd}
.opp-score{font-size:11px;color:#8bc0ff;background:#13294a;border:1px solid #25405c;padding:2px 9px;border-radius:10px;font-weight:700}
.opp-jump{margin-left:auto;font-size:11px;color:#7ab8ff;text-decoration:none;background:#11233a;border:1px solid #25405c;padding:3px 10px;border-radius:6px}
.opp-jump:hover{background:#1a2e4a}
.opp-label{font-size:15px;font-weight:700;color:#f0f6fc;line-height:1.4;margin-bottom:8px}
.opp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.opp-tag{font-size:10px;color:#9fc6f0;background:#11233a;border:1px solid #25405c;padding:2px 7px;border-radius:4px}
.opp-stats{display:flex;flex-wrap:wrap;gap:14px;padding:10px 0;border-top:1px solid #1a2c40;border-bottom:1px solid #1a2c40;margin-bottom:10px}
.opp-stat{display:flex;flex-direction:column;gap:1px}
.opp-stat b{font-size:14px;color:#6aa8f5;font-weight:800}
.opp-stat small{font-size:9px;color:#5e7c9a}
.opp-refs-label{font-size:10px;color:#5e7c9a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.opp-refs{display:flex;flex-direction:column;gap:6px}
.opp-ref{display:flex;gap:8px;text-decoration:none;background:#0c1726;border:1px solid #1a2c40;border-radius:6px;padding:5px;transition:border-color .15s}
.opp-ref:hover{border-color:#25405c;background:#101e30}
.opp-ref img{width:80px;height:45px;object-fit:cover;border-radius:4px;flex-shrink:0}
.opp-ref-body{min-width:0;display:flex;flex-direction:column;justify-content:center}
.opp-ref-title{font-size:11px;color:#cdd9e5;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.opp-ref-meta{font-size:10px;color:#5e7c9a;margin-top:2px}
.opp-make{font-size:11px;color:#7ab8ff;background:#13294a;border:1px solid #25405c;padding:3px 10px;border-radius:6px;cursor:pointer}
.opp-make:hover{background:#1a3a5c}
.nav-pdca{background:#13294a!important;color:#7ab8ff!important;border-color:#2f4a6a!important;font-weight:700}
.nav-pdca:hover{background:#1a3a5c!important}
/* 📈 期間別ランキング */
.trend-section{background:#0c1320;border-bottom:2px solid #16273a}
.trend-headbar{padding:13px 24px 6px}
.trend-title{font-size:16px;font-weight:800;color:#6aa8f5}
.trend-sub{font-size:11px;color:#5e7c9a;margin-left:12px}
.trend-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 24px 14px;border-bottom:1px solid #16273a}
.trend-lbl{font-size:10px;color:#5e7c9a;text-transform:uppercase;letter-spacing:1px;margin:0 4px 0 10px}
.trend-lbl:first-child{margin-left:0}
.trend-btn,.trend-sort,.trend-apply{background:#13202e;color:#7ab8ff;border:1px solid #22364a;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.trend-btn:hover,.trend-sort:hover,.trend-apply:hover{background:#1a2e42}
.trend-btn.active,.trend-sort.active{background:#1d4ed8;color:#fff;border-color:#2563eb;font-weight:700}
.trend-date{background:#13202e;color:#cde;border:1px solid #22364a;padding:3px 8px;border-radius:6px;font-size:12px;color-scheme:dark}
.trend-list{column-width:560px;column-gap:16px;padding:16px 24px}
.trend-row{display:flex;gap:14px;align-items:center;text-decoration:none;background:#101c2a;border:1px solid #1c2e42;border-radius:8px;padding:10px;transition:border-color .15s;break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:12px}
.trend-row:hover{border-color:#2f4a6a;background:#13243a}
.trend-rank{font-size:24px;font-weight:900;color:#6aa8f5;min-width:42px;text-align:center;flex-shrink:0}
.trend-rank.top3{color:#93c5fd}
.trend-row img{width:180px;height:101px;object-fit:cover;border-radius:6px;flex-shrink:0}
.trend-b{min-width:0}
.trend-t{font-size:15px;color:#e8eef5;line-height:1.45;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.trend-m{font-size:12px;color:#6a8099;margin-top:6px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.trend-m b{color:#6aa8f5;font-weight:700}
.trend-dpd{color:#5fb0c9}
.trend-ch{background:#15202e;padding:1px 6px;border-radius:3px;color:#8197ad}
.trend-empty{color:#5a7088;font-size:13px;text-align:center;padding:24px;border:1px dashed #1c2e42;border-radius:8px;grid-column:1/-1}
/* 🔎 サムネ・タイトル検索 */
.srch-section{background:#0c1320;border-bottom:2px solid #16273a}
.srch-headbar{padding:13px 24px 6px}
.srch-title{font-size:16px;font-weight:800;color:#6aa8f5}
.srch-sub{font-size:11px;color:#5e7c9a;margin-left:12px}
.srch-bar{display:flex;gap:8px;padding:6px 24px 4px;align-items:center}
.srch-bar input{flex:1;max-width:680px;background:#101c28;border:1px solid #25405c;color:#eaf1f8;padding:9px 14px;border-radius:8px;font-size:14px;outline:none}
.srch-bar input:focus{border-color:#3b82f6}
.srch-bar input::placeholder{color:#4a6178}
.srch-clear{background:#13202e;color:#7d93a8;border:1px solid #22364a;padding:8px 13px;border-radius:8px;cursor:pointer;font-size:12px}
.srch-clear:hover{color:#cdd9e5;border-color:#2f4a6a}
.srch-angles{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 24px 14px;border-bottom:1px solid #16273a}
.srch-lbl{font-size:10px;color:#5e7c9a;text-transform:uppercase;letter-spacing:1px;margin-right:6px}
.srch-ang{background:#13202e;color:#9fb2c6;border:1px solid #22364a;padding:4px 12px;border-radius:14px;cursor:pointer;font-size:12px}
.srch-ang:hover{background:#1a2e42;color:#e8eef5}
.srch-ang.active{background:#1d4ed8;color:#fff;border-color:#2563eb;font-weight:700}
.srch-list{column-width:520px;column-gap:16px;padding:16px 24px}

n日本でも長く使われているアプリを使うようにしましょう\n続いて2つ目は「TikTok(ティックトック)」です\n短い動画が次々と流れてくるアプリで\n世界中で爆発的に流行しているSNSですよね\n自分は使わないという方も\nご家族の中で使っている方を見かけたことがある\nという方は多いんじゃないでしょうか\nこのTikTok、利用者の知らないうちに\nこんな情報を集めていることが分かっているんです\n・あなたが今どこにいるかの「位置情報」を1時間に1回取得\n・スマホに登録されているご家族やお友達の連絡先\n・カレンダーに入れている病院の予約日、旅行の予定、家族の誕生日\nそしてここが今日1番お伝えしたい話なんですが\nTikTokは「あなたがコピーした文字」を裏でこっそり読み取っていた\nことが発覚したんです\nたとえば、ネットショッピングで\nクレジットカードの番号を「コピー&貼り付け」したり\n銀行のパスワードを誰かに送るときに\nコピーすることってありますよね\nそのコピーした内容を\nTikTokが裏で全部読み取っていた\nということなんですよ\nこれは2020年に世界中で大問題になりまして\nアップルが「TikTokがコピーした文字を盗み見ています」と\nスマホ画面で通知する機能を作ったほどです\n例えるなら\nあなたがメモした暗証番号を\n誰かが後ろからずっと覗き見していた、そんな状態ですね\nそして実は、すでに世界中の政府がこれを「危ない」と判断しているんです\nアメリカでは、政府で働く人たちの仕事用スマホで\nTikTokを使うことが法律で禁止されました\n続いてカナダ、イギリス、ヨーロッパも同じように禁止\n日本でも、政府の中で大事な情報を扱う人たちのスマホでは\nTikTokは使わないようにしましょう\nというルールが決められているんですよ\n世界中の政府が「これは仕事で使わせると危ない」と\n認めたアプリ\nそれが今、あなたやご家族のスマホに入っているとしたら\n本当に恐ろしいですよね\nご自身のスマホに入っている方は今すぐ削除\nそしてご家族——特に若い方が使っているのを見かけたら\n「世界中の政府が危ないって言ってるアプリだよ」と\nぜひ教えてあげてください\nあなたのその一言が、ご家族を守ることにつながりますから\n3つ目は、「電力会社」「水道局」「ガス会社」を装った偽アプリです\n最近、こんなメッセージが届いたことありませんか?\n「電気料金のお支払いが確認できません」\n「至急、お支払いくださいこのままだと送電を停止します」\n突然こんなメッセージが届いて、慌ててリンクを押してしまった経験\nご自身、もしくはご家族でないでしょうか\n実はこれ、東京電力や関西電力など\n大手の電力会社が公式に注意喚起を出している\n危険な詐欺の手口なんです\n何が怖いかと言うと\n電気・ガス・水道って、誰もが使っているライフラインですよね\n「電気が止まったら困る」\n「水が止まったら大変」\nそんな不安を逆手に取って、慌てさせて\n偽サイトや偽アプリに誘導する\nそしてその偽サイトで何を入力させるか\nお客様番号、生年月日、電話番号\nそしてクレジットカード番号と有効期限\n入力した瞬間、あなたのカード情報は\nそっくりそのまま犯人の手に渡る——\nそんな仕組みになっているんです\nしかも怖いのが\n偽サイトは本物そっくりに作られていること\n東京電力の公式サイトも\n「フィッシングサイトは本物の画面をコピーして作られていて\n見分けるのは非常に困難」と公式に発表しているほどです\n例えるなら\n電力会社の制服を着た人が家に来て\n「未払いがあります、すぐ払ってください」と言われて\n慌ててお財布を渡してしまうような状態ですね\n電気・ガス・水道などの料金のお知らせは\nSMSやメールのリンクから絶対にアクセスしないでください\n支払い状況を確認したい時は\nご自身でブラウザを開いて\n各会社の公式アプリや公式サイトから\n直接ログインするようにしましょう\nもし不安な場合は\nお手元の検針票に書かれている電話番号に\n直接かけて確認するのが1番確実です\n4つ目はQRコード読み取りアプリです\nお店のメニューやチラシで\nQRコードを読み取る場面、増えましたよね\n実はQRコードはAndroidに最初から入っている\n「カメラ」アプリで読み取れるんです\nわざわざ専用のアプリを入れる必要は、まったくないんですよ\nそれなのに、なぜこんなにたくさんの\n「読み取り専用アプリ」が出回っているか\n答えはシンプル\nそのアプリ自体がウイルスだからなんです\n実際、過去にGoogle Playストアで\n1,00 nこれがニュースになった時は本当に大騒ぎでした\n当時の政府も全国の役所や大学に\n「使うのをやめなさい」と呼びかけたほどです\nちなみにこのSimejiも\n運営は中国の会社なんですね\nその後、アプリは修正されたとされていますが\n9ヶ月間誰にも気づかれなかったという事実は変わりませんよね\nそして、その間に入力したクレジットカード番号が\nどこに渡っていたかは、もう確認できないんです\nAndroidに最初から入っている\n「Gboard(ジーボード)」というGoogle製のキーボードに\n変更しましょう\n世界で1番使われているキーボードなので安心です\n最後の8つ目は「無料VPNアプリ」です\nVPN——耳慣れない言葉かもしれませんが\n簡単に言うと\n「スマホの通信を暗号化して、安全に守ってくれるアプリ」\nということになっています\n「無料で安全になるなら」と思って\nダウンロードした方がいらっしゃるかもしれませんね\nですが、これが全く逆なんです\nオーストラリアの調査機関が\nAndroidの無料VPNアプリを283本調べたところ\n38%にウイルスが含まれていたことが分かっています\n3本に1本以上の割合ですよ\n中でも有名な事件として\nダウンロード数が1億回を超えていた\n「SuperVPN」という無料VPNアプリで\n2,100万人分の個人情報が流出したことがありました\n漏れた情報の中には\nパスワードや、VPNを使っている間にやり取りしていた\nクレジットカード情報やIDも含まれていたんです\nつまり「安全のために入れた」はずのアプリが\n実は通信内容を全部見られていて\nそこからクレジットカード番号まで抜かれていた\nということになります\nさらに2024年5月には\nFBIが「史上最大のウイルス感染ネットワーク」を解体\nという事件があったんですが\nこのとき6つの無料VPNアプリが\nそのウイルスを広める手段として使われていたんです\n「無料」のものほど、何かを差し出している\nということ、覚えておいてくださいね\n外出先でWi-Fiを使うときに不安を感じる方は\n携帯電話会社の通信(4Gや5G)を使えば十分安全です\n無料VPNアプリは、今すぐ削除することをおすすめします\nさて、今日は危険なアプリ8つをご紹介してきました\nおさらいすると\n1. Temu / SHEIN(お買い物アプリ)\n2. TikTok(動画アプリ)\n3. 電力会社・水道局を装った偽アプリ怪しい\n4. 怪しいQRコード読み取りアプリ\n5. 怪しいクリーナーアプリ\n6.セキュリティアプリ\n7. Simeji(キーボードアプリ)\n8. 無料VPNアプリ\nこの8つになります\n今回ご紹介した8つのアプリ、すでにインストールされていましたか？\nこれは私の母の話になるのですが\n母のスマホにも\nTemuやTikTokなどが普通に入っていました\n本人に聞くと\n「安いから」「みんな使っているから」\nという感覚で入れていただけみたいです\nまさか個人情報やクレジットカード情報が危険にさらされる可能性があるなんて\nまったく思っていませんでした\nでも、これって母だけの話ではないと思います\n便利そう、お得そう、楽しそう\nそう見えるアプリほど、つい深く考えずに入れてしまいますよね\n特にスマホに慣れていない方やご年配の方は\n危険なアプリかどうかを自分で判断するのは難しい\nだからこそ、私たちが先に知って家族に教えてあげることが本当に大切だと思います\n1つでも入っていた方、削除した方\nぜひコメントで教えてくださいね\n実は、今日ご紹介したアプリ以外にも\n普段何気なく使っている身近なアプリの\n「ある設定」を見直さないと\n個人情報が外に漏れてしまう\nというケースがあるんです\n今日のお話、ぜひご家族や身近な方にも教えてあげてください\n「危ないよ」と知っているだけで、被害を防げます\n次の動画では\nそうした見落としがちな危険な設定について\n詳しく解説していきます\n気になる方はチャンネル登録をして\n次の動画が出るのをお待ちいただけると嬉しいです\nこれからもスマホを安心して使えるような情報をお届けしていきますので\nいいねとチャンネル登録もお願いしますね\nそれでは、また次の動画でお会いしましょう"}, {"doc_heading": "企画2　充電 違法になりました", "title": "【知らないと超危険】USBポートを使用するだけで とんでもない事件に…", "thumb_copy": "・やったことのある行為・見たことあるコンセントで自分ごと化\n・違法になった理由が知りたい（何がいけないのか見当もつかない）\n・便利だったものが違法になる≒自分ではどうすることもできない無力感・怒りを国にぶつけたくなる\n・この情報を知ることで違法行為をしなくてすむ", "target": "【サムネが伸びた理由(仮説)】\nこれ見れば被害抑えられる\n刺しただけで受ける被害→個人情報が取られる、スマホが使えなくなる\n\n【他アカウントの再生数】\n🔸伸びなかったサムネ\nAIで作った画像で実際にないコンセントや充電器だから自分ごと化できない\n訴求が長い\n刺す、接続するといった動詞がないため\n「刺しだだけでウイルス感染！？」のような衝撃がない\n🔸サムネ参考\nhttps://www.youtube.com/@yukkuri-motoring\nこのチャンネルの『違法になりました』サムネは全部伸びる傾向\n・該当者が多い（母数）\n・既存の\"違法◯◯\"ワードがない（意外性）→一番最後のサムネは「違法駐車」の概念があるから伸びない\n・最近変わった/これから変わる（時事性）\n・金銭被害が併走（損失回避）\n・「あなたが今やってる行為」を指してる（自分ごと化）", "script": "カフェ・ホテル・空港の充電ポート、使ってませんか?\n何も考えず使うと、クレカ番号・暗証番号・写真まで全部抜き取られる\nFBIもNTTも警告を出している深刻な問題\n今日は危険な充電方法+2025年最新手口+家の充電も違法だった話+対策4つを紹介\nなぜここまで日本人が狙われるのか\n日本人のクレカ情報は闇市場で1件114円で売買されている\nだから世界中で手口が急増中\nパート1：ジュースジャッキングの仕組みと被害\n充電ポートが犯罪者に改造されている\nUSBケーブルは電気＋データの両方を通す → 刺した瞬間に抜かれる\nポート改造は数分でできる\n盗まれるもの：ロック解除番号、銀行パスワード、クレカ情報、写真、連絡先、カメラ映像\n一番怖いのは気づけないこと（スマホは普通に動く）\nだからFBI・NTTが公式に警告\nパート2：2025年最新手口・チョイスジャッキング\n「許可しない」を押せば大丈夫だったのは過去の話\n2025年、オーストリアの研究で新手口発見\n刺した瞬間、わずか0.3秒で「許可」ボタンが勝手に押される\nホテル備付ケーブル、タクシー備付ケーブルが特に危険\nOMGケーブル（盗聴チップ入り）はAmazonで誰でも買える\nパート3：家の充電器も実は違法だった\n家での充電にも違法の落とし穴\nPSEマーク（電気用品安全法）がない充電器は販売も使用も違法\nAmazonの激安充電器に違法品が多い\n実際に火災事故が年間100件以上発生（経産省データ）\n100均の格安ケーブルも要注意\nパート4：被害を100%防ぐ対策4つ\nコンセントから直接充電する（PSEマーク付き正規品で）\n充電専用ケーブルを持ち歩く（100均で買える）\nUSBデータブロッカーを使う（数百円のアダプター）\nモバイルバッテリーを持ち歩く（PSEマーク付き日本メーカー品）\nエンディング\n今すぐ家の充電器にPSEマークがあるか確認\n外出時はコンセント直結を習慣に\n家族・友人にもこの情報をシェア\n見出しタイトル含め　5133文字　　14分前後\n【知らないと超危険】ここを使用するだけで とんでもない事件に…\n━━━━━━━━━━━━━━━━━━━━\n■ 冒頭フック\n━━━━━━━━━━━━━━━━━━━━\nこんにちは、由美子です\n突然ですが\nカフェやホテルについているあの便利な充電場所\nこのどちらかにスマホを刺すだけで\nクレジットカードの番号や\n銀行の暗証番号\nスマホの中の写真まで\n全部抜き取られてしまう恐ろしい手口が\n今、急増しているのをご存知ですか？\n実はこれ、アメリカのFBIまでもが\n公式に警告を出している深刻な問題なんです\n今日はその被害と対策\nそしてここ1年で新しく見つかった\nほんの一瞬で個人情報が流出する犯罪者の最新手口に加え\nここだけの話、皆さんが今、お家で使っているあの充電器の中に\n法律違反のものがかなり多く出回っているという事実\nこれらをまとめてお伝えします\n知っているか知らないかで\nあなただけでなくご家族やご友人を助けられる内容になるので\nぜひ最後までゆっくり見ていってください\n━━━━━━━━━━━━━━━━━━━━\n■ ジュースジャッキング\n━━━━━━━━━━━━━━━━━━━━\n最初の手口は「ジュースジャッキング」と呼ばれるものです\nこれは公共の場所にあるUSBポートを使って\nスマホの中身を全部盗むという犯罪の手口です\nもしこの手口に引っかかってしまうと\nびっくりするくらいたくさんの個人情報が\n気づかないうちに全部抜き取られてしまうんです\nどうやって盗まれるのかというと\nスマホの中にあるウイルスが入れられてしまうんですね\nこのウイルスは皆さんがスマホで入力する文字を\n1文字残らず記録して犯罪者に送ってしまう\nそんな能力を持っているんです\nあなたがスマホに入力する文字を\n犯罪者が真後ろからずっと覗き見している状態を\nイメージしてみてください\n本当に恐ろしいですよね\n具体的にどんなものが盗まれてしまうかというと\nスマホのロックを解除する暗証番号\n銀行のアプリを開く時のパスワードや暗証番号\nこれら全部が犯罪者に送られてしまいます\nAmazonやYahooショッピングでお買い物をする時に入力する\nIDやパスワード、これも筒抜けです\nそして、何か買い物しようとして\nクレジットカードの番号を入力したら\nカード番号も名前も住所も\n全部盗まれてしまうんですね\nつまり皆さんがスマホで入力したものは\n全部犯罪者に筒抜けになってしまうということなんです\nさらに、スマホに保存している写真や動画も\n全部見られてしまいますし\nスマホのカメラやマイクを\n勝手に操作されてしまうことまであるんです\nスマホを充電しただけで\nこんなことになるって本当に怖いですよね\nしかも一番怖いのは、このウイルスが入ってしまっても\nスマホは何事もなかったかのように\n普通に動いているように見えるということなんです\n例えばある日\nクレジットカードが不正利用されていた\nということが分かったとします\nその時、皆さんは何を疑いますか？\n「変なメールに引っかかったかな？」\n「ネットショッピングのサイトから情報が漏れたのかな？」\n普通はそう考えますよね\nですから「あの時、外で充電したから個人情報が抜かれた」なんて\n原因にたどり着ける人はほとんどいないんです\n知らないうちに個人情報が抜き取られ続けていて\n気づいた時にはもう遅い\nこれが現実なんです\nしかし、今のところ日本国内で\nジュースジャッキングの被害がハッキリと報告されている事例は\nほとんどありません\nだからといって安心はできないんです\n理由はシンプルで、このジュースジャッキングという手口自体は\nすでに海外では大問題になっていて\n先ほどお話ししたように国家機関が\nわざわざ国民に向けて警告を出すレベルで深刻化しています\nそして海外で警告が出ている手口というのは\n時間差で日本に入ってきても何もおかしくないんです\n犯罪者はこの手口を実行するために\nわずか数分でUSBポートの改造を済ませてしまうらしいので\n今この動画を見て対策をしておかないと\n明日、あなたが被害者になっていてもおかしくない\nということなんですね\n━━━━━━━━━━━━━━━━━━━━\n■ チョイスジャッキング\n━━━━━━━━━━━━━━━━━━━━\nでは、刺してしまった場合どうすればいいのか\n実はこれまで、スマホをUSBポートに差すと\n画面に確認のメッセージが出てきていました\nAndroidの場合は\n画面の上の方に通知が出てきて\n「充電のみ」か「ファイル転送」か\nどちらかを選んでくださいという画面\niPhoneの場合は\n「このコンピュータを信頼しますか？」というメッセージが出てきます\nここで「充電のみ」あるいは「信頼しない」を選んでおけば\nデータは盗まれない仕組みになっていたんですね\n実はこの仕組みのおかげで\n約10年間、私たちのスマホは守られていました\nしかしこの安全対策が\n2025年についに破られてしまったんです\nオーストリアのとある大学の研究チームが\n新しい手口を発見しました\nその名も「チョイスジャッキング」\n「選択を乗っ取る」という意味の名前です\n何が新しいかというと、ケーブルを差した瞬間\nわずか0.13秒で\n「ファイル転送を許可する」「信頼する」のボタンが\n勝手に押されてしまうんです\n0.13秒というのは、人間のまばたきよりも速い時間ですから\n画面を見て、判断する時間すらありません\nこれが現実なんですね\n特に深刻なのが一部のAndroid機種で\n画面にロックがかかっていても\nそのまま個人データを抜かれてしまうことが確認されています\nでもここで、ちょっと希望のあるお話もあります\nこのことを受けて、アップルとグーグルは2025年に\n対策のアップデートを出してくれました\niPhoneの場合は「iOS 18.4」というアップデート以降\nAndroidの場合は「Android 15」というアップデート以降\nそれぞれUSBで何かを繋いだ時に\n指紋認証や暗証番号の入力が必要になるという\n安全機能が追加されました\n逆に言うと、古いスマホを使い続けている方や\nアップデートを止めている方は\n今もこの危険な状態のままということになります\nスマホの「設定」から「ソフトウェア更新」を開いて\n最新の状態になっているか\n動画を見終わったら必ず確認してみてくださいね\n━━━━━━━━━━━━━━━━━━━━\n■外で安全に充電する対策4つ\n━━━━━━━━━━━━━━━━━━━━\nここまで聞いて\n「じゃあもう、どうやって充電すればいいの？」\nと不安になった方も多いと思います\nでも安心してください\nここからお伝えする対策を4つ\nこれさえやっておけば\n外で充電する時の被害をきっちり防げます\nしかもとても簡単に済む方法ばかりですので\nぜひメモを取りながら聞いてくださいね\n──── 対策その1・モバイルバッテリーを持ち歩く ────\nまず一番完璧な対策は\n「自分専用のモバイルバッテリーを持ち歩くこと」です\nなぜこれが一番完璧かというと\nそもそも公共の充電ポートを使わなければ\n今日お話しした被害は\n全部100%防げるからなんですね\n選び方のポイントは3つあります\n1つ目、信頼できる日本メーカーの正規品を選ぶこと\n2つ目、容量は10,000mAh以上のものを選ぶこと\nこれでスマホを2回から3回フル充電できます\n3つ目、できるだけ軽くて薄いものを選ぶこと\n持ち歩くのが負担にならないものがいいですね\n──── 対策その2・コンセントから直接充電する ────\n2つ目は、モバイルバッテリーを忘れてしまった時の対策\n「コンセントから直接充電する」方法です\n家で使っている四角い充電アダプターありますよね\nあれをカバンに入れて持ち歩いてください\nコンセントから流れてくるのは電気だけなので\nデータが盗まれる心配は一切ないんです\nUSBの差し込み口の方は、先ほどお話ししたとおり\n犯罪者に改造されている可能性があるので\n絶対に使わないようにしてください\n──── 対策その3・充電専用ケーブルを持ち歩く ────\n3つ目は、どうしてもUSBポートしか使えない時のための対策です\nそんな時にまず知っておいてほしいのが\nこんなケーブルです\nホテルの部屋に備え付けられているケーブル\nタクシーの後部座席に置いてあるケーブル\nこれは絶対に使わないでください\n何が仕込まれているかわからないので\n危険性が一気に跳ね上がります\n中でも特に恐ろしいのが「OMGケーブル」と呼ばれるものです\n見た目はただのUSBケーブルなんですが\n中に小さなチップが仕込まれていて\nあなたがスマホで入力した文字\nパスワード\nクレジットカード番号\nそれを全部記録して\n犯罪者に送ってしまうんです\nしかもこのOMGケーブル\n実はネットで個人でも買えてしまうんですよね\nつまり、人から借りたケーブル\nホテルやタクシーに置いてあるケーブル\nそれが安全な充電ケーブルなのか\nOMGケーブルなのか\n見た目では区別がつかないんです\nだからこそ、外で充電する時は\n自分専用の「充電専用ケーブル」を\n1本カバンに入れて持ち歩いてください\nこれは100円ショップでも普通に売っていて\nパッケージに「充電専用」または「データ通信非対応」と\n書かれているものを選べばOKです\n「普通のケーブルと何が違うの？」と思いますよね\n普通のケーブルは、電気を流す線と\nデータを流す線が両方入っているんです\nでも充電専用ケーブルは\nデータを流す線が物理的に入っていない\n線がないものはデータの抜きようがありませんよね\nだから何が刺さっていようが\nデータは絶対に盗まれないというわけです\n──── 対策その4・USBデータブロッカーを使う ────\n最後、4つ目は\nお気に入りのケーブルがあって\nそのまま使いたいという方向けの対策です\n「USBデータブロッカー」という小さな部品があります\n指先くらいの小さなアダプターで\nこれをUSBポートとケーブルの間に挟むだけ\nデータの通信を物理的に遮断してくれるんです\nこれも数百円で買えます\n特に旅行や出張が多い方\n防災リュックの中にも1個入れておくと安心ですよ\n━━━━━━━━━━━━━━━━━━━━\n■ 家の充電器も実は違法だった\n━━━━━━━━━━━━━━━━━━━━\nさて、ここまでで外で安全に充電する方法はバッチリですね\nただ、ここまで聞いて\n「外がそんなに怖いなら、もう家でしか充電しない」\nそう思った方もいらっしゃると思います\nその判断、半分は正解です\nでも実は、家での充電にも\n別の落とし穴があるんです\nしかもこちらは法律違反まで絡んでくる\nかなり深刻な話なんですね\nつまり外で対策をしている方も\n家でしか充電しないと決めた方も\n両方とも、ここからの話は必ず知っておいてください\nちなみに、さっきの対策1で紹介したモバイルバッテリー\nそれから対策2で紹介したコンセント直結用の充電器\nこれらにもあてはまる話ですので\n合わせて覚えておいてくださいね\n皆さんの充電器には\n「PSE」という丸い印、書かれていますか？\n実はこのPSEマークというのは\n電気用品安全法という日本の法律で\n日本国内で売っていいと認められた電気製品にだけ\n付けられるマークなんです\nつまり、PSEマークがない充電器を売ること\nこれは法律違反、完全に違法なんですね\n【テロップ表示】\n※罰則：法人は1億円以下の罰金\n個人は1年以下の懲役または100万円以下の罰金\nこれくらい、かなり厳しい罰則が定められているんです\n特に注意してほしいのが、ネット通販で売っている\n500円とか1,000円くらいの激安充電器\n純正品より何分の1かの値段で買えるから\nお得だと思って買ってしまう方が多いんですが\nこの中にはPSEマークがない違法品が\n紛れ込んでいることがよくあるんです\nなぜここまで厳しく義務化されているのかというと\n寝ている間に枕の下で充電器が発火した\nバッテリーが膨らんでスマホが破裂した\nコンセントから火花が出て家が全焼してしまった\nこのような火災事故が実際に起きているからです\n公式なデータ（経済産業省）によると\nモバイルバッテリーやスマホの充電器などによる事故は\n2020年から2024年までの5年間で\n1,860件報告されています\nそのうちの約85パーセント\n1,587件が火災事故に発展しているんです\nとても危険ですよね\nですので、お家の充電器はもちろん\nさっき紹介したモバイルバッテリーや\n持ち歩く用の充電アダプターも\nすべてPSEマーク付きの正規品かどうか\n動画を見終わったら必ず確認してみてください\nもしなければ、火災の原因になる可能性があるので\n今日中に買い替えていただくことを強くおすすめします\n━━━━━━━━━━━━━━━━━━━━\n■ エンディング\n━━━━━━━━━━━━━━━━━━━━\nそして、今日の内容\nぜひご家族やお友達にもシェアしてあげてください\n知っているだけで防げる被害です\n特に、普段スマホをよく使う方ほど\n被害に遭いやすいので\n周りの方にも教えてあげてくださいね\nこれからもスマホを安心して使えるような情報をお届けしていきますので\nいいねとチャンネル登録もお願いしますね\nそれでは、また次の動画でお会いしましょう\n━━━━━━━━━━━━━━━━━━━━\n■ 冒頭フック\n━━━━━━━━━━━━━━━━━━━━\nこんにちは、由美子です\n突然ですが\nコンビニやカフェ、ホテルについてるこのコンセントに見覚えありますか？\n実はこのどちらかにスマホを刺すだけで\nクレジットカードの番号や\n銀行の暗証番号\nスマホの中の写真まで\n全部抜き取られてしまう恐ろしい手口が今急増しているんです\nあのアメリカのFBIまでも\n公式に警告を出すぐらいとても深刻な問題…\n今日はその詳しい被害内容と対策\nそしてここ1年で新しく見つかった\nほんの一瞬で個人情報が流出する犯罪者の最新手口について\n徹底的に解説していきます\n動画の最後には\nほとんどの人が持っているスマホの充電器が\nもしかしたら違法になっている可能性もあるので\nぜひ最後までみて今のうちに対策しておきましょう\n━━━━━━━━━━━━━━━━━━━━\n■ ジュースジャッキング\n━━━━━━━━━━━━━━━━━━━━\n最初の手口は「ジュースジャッキング」と呼ばれるものです\nこれは公共の場所にあるUSBポートを使って\nスマホの中身を全部盗むという犯罪の手口です\nもしこの手口に引っかかってしまうと\nびっくりするくらいたくさんの個人情報が\n気づかないうちに全部抜き取られてしまうんです\nどうやって盗まれるのかというと\nスマホの中にあるウイルスが入れられてしまうんですね\nこのウイルスは皆さんがスマホで入力する文字を\n1文字残らず記録して犯罪者に送ってしまう\nそんな能力を持っているんです\nあなたがスマホに入力する文字を\n犯罪者が真後ろからずっと覗き見している状態を\nイメージしてみてください\n本当に恐ろしいですよね\n具体的にどんなものが盗まれてしまうかというと\nスマホのロックを解除する暗証番号\n銀行のアプリを開く時のパスワードや暗証番号\nこれら全部が犯罪者に送られてしまいます\nAmazonやYahooショッピングでお買い物をする時に入力する\nIDやパスワード、これも筒抜けです\nそして、何か買い物しようとして\nクレジットカードの番号を入力したら\nカード番号も名前も住所も\n全部盗まれてしまうんですね\nつまり皆さんがスマホで入力したものは\n全部犯罪者に筒抜けになってしまうということなんです\nさらに、スマホに保存している写真や動画も\n全部見られてしまいますし\nスマホのカメラやマイクを\n勝手に操作されてしまうことまであるんです\nスマホを充電しただけで\nこんなことになるって本当に怖いですよね\nしかも一番怖いのは、このウイルスが入ってしまっても\nスマホは何事もなかったかのように\n普通に動いているように見えるということなんです\n例えばある日\nクレジットカードが不正利用されていた\nということが分かったとします\nその時、皆さんは何を疑いますか？\n「変なメールに引っかかったかな？」\n「ネットショッピングのサイトから情報が漏れたのかな？」\n普通はそう考えますよね\nですから「あの時、外で充電したから個人情報が抜かれた」なんて\n原因にたどり着ける人はほとんどいないんです\n知らないうちに個人情報が抜き取られ続けていて\n気づいた時にはもう遅い\nこれが現実なんです\nしかし、今のところ日本国内で\nジュースジャッキングの被害がハッキリと報告されている事例は\nほとんどありません\nだからといって安心はできないんです\n理由はシンプルで、このジュースジャッキングという手口自体は\nすでに海外では大問題になっていて\n先ほどお話ししたように国家機関が\nわざわざ国民に向けて警告を出すレベルで深刻化しています\nそして海外で警告が出ている手口というのは\n時間差で日本に入ってきても何もおかしくないんです\n犯罪者はこの手口を実行するために\nわずか数分でUSBポートの改造を済ませてしまうらしいので\n今この動画を見て対策をしておかないと\n明日、あなたが被害者になっていてもおかしくない\nということなんですね\n━━━━━━━━━━━━━━━━━━━━\n■ チョイスジャッキング\n━━━━━━━━━━━━━━━━━━━━\nでは、刺してしまった場合どうすればいいのか\n実はこれまで、スマホをUSBポートに差すと\n画面に確認のメッセージが出てきていました\nAndroidの場合は\n画面の上の方に通知が出てきて\n「充電のみ」か「ファイル転送」か\nどちらかを選んでくださいという画面\niPhoneの場合は\n「このコンピュータを信頼しますか？」というメッセージが出てきます\nここで「充電のみ」あるいは「信頼しない」を選んでおけば\nデータは盗まれない仕組みになっていたんですね\n実はこの仕組みのおかげで\n約10年間、私たちのスマホは守られていました\nしかしこの安全対策が\n2025年についに破られてしまったんです\nオーストリアのとある大学の研究チームが\n新しい手口を発見しました\nその名も「チョイスジャッキング」\n「選択を乗っ取る」という意味の名前です\n何が新しいかというと、ケーブルを差した瞬間\nわずか0.13秒で\n「ファイル転送を許可する」「信頼する」のボタンが\n勝手に押されてしまうんです\n0.13秒というのは、人間のまばたきよりも速い時間ですから\n画面を見て、判断する時間すらありません\nこれが現実なんですね\n特に深刻なのが一部のAndroid機種で\n画面にロックがかかっていても\nそのまま個人データを抜かれてしまうことが確認されています\nでもここで、ちょっと希望のあるお話もあります\nこのことを受けて、アップルとグーグルは2025年に\n対策のアップデートを出してくれました\niPhoneの場合は「iOS 18.4」というアップデート以降\nAndroidの場合は「Android 15」というアップデート以降\nそれぞれUSBで何かを繋いだ時に\n指紋認証や暗証番号の入力が必要になるという\n安全機能が追加されました\n逆に言うと、古いスマホを使い続けている方や\nアップデートを止めている方は\n今もこの危険な状態のままということになります\nスマホの「設定」から「ソフトウェア更新」を開いて\n最新の状態になっているか\n動画を見終わったら必ず確認してみてくださいね\n━━━━━━━━━━━━━━━━━━━━\n■外で安全に充電する対策4つ\n━━━━━━━━━━━━━━━━━━━━\nここまで聞いて\n「じゃあもう、どうやって充電すればいいの？」\nと不安になった方も多いと思います\nでも安心してください\nここからお伝えする対策を4つ\nこれさえやっておけば\n外で充電する時の被害をきっちり防げます\nしかもとても簡単に済む方法ばかりですので\nぜひメモを取りながら聞いてくださいね\n──── 対策その1・モバイルバッテリーを持ち歩く ────\nまず一番完璧な対策は\n「自分専用のモバイルバッテリーを持ち歩くこと」です\nなぜこれが一番完璧かというと\nそもそも公共の充電ポートを使わなければ\n今日お話しした被害は\n全部100%防げるからなんですね\n選び方のポイントは3つあります\n1つ目、信頼できる日本メーカーの正規品を選ぶこと\n2つ目、容量は10,000mAh以上のものを選ぶこと\nこれでスマホを2回から3回フル充電できます\n3つ目、できるだけ軽くて薄いものを選ぶこと\n持ち歩くのが負担にならないものがいいですね\n──── 対策その2・コンセントから直接充電する ────\n2つ目は、モバイルバッテリーを忘れてしまった時の対策\n「コンセントから直接充電する」方法です\n家で使っている四角い充電アダプターありますよね\nあれをカバンに入れて持ち歩いてください\nコンセントから流れてくるのは電気だけなので\nデータが盗まれる心配は一切ないんです\nUSBの差し込み口の方は、先ほどお話ししたとおり\n犯罪者に改造されている可能性があるので\n絶対に使わないようにしてください\n──── 対策その3・充電専用ケーブルを持ち歩く ────\n3つ目は、どうしてもUSBポートしか使えない時のための対策です\nそんな時にまず知っておいてほしいのが\nこんなケーブルです\nホテルの部屋に備え付けられているケーブル\nタクシーの後部座席に置いてあるケーブル\nこれは絶対に使わないでください\n何が仕込まれているかわからないので\n危険性が一気に跳ね上がります\n中でも特に恐ろしいのが「OMGケーブル」と呼ばれるものです\n見た目はただのUSBケーブルなんですが\n中に小さなチップが仕込まれていて\nあなたがスマホで入力した文字\nパスワード\nクレジットカード番号\nそれを全部記録して\n犯罪者に送ってしまうんです\nしかもこのOMGケーブル\n実はネットで個人でも買えてしまうんですよね\nつまり、人から借りたケーブル\nホテルやタクシーに置いてあるケーブル\nそれが安全な充電ケーブルなのか\nOMGケーブルなのか\n見た目では区別がつかないんです\nだからこそ、外で充電する時は\n自分専用の「充電専用ケーブル」を\n1本カバンに入れて持ち歩いてください\nこれは100円ショップでも普通に売っていて\nパッケージに「充電専用」または「データ通信非対応」と\n書かれているものを選べばOKです\n「普通のケーブルと何が違うの？」と思いますよね\n普通のケーブルは、電気を流す線と\nデータを流す線が両方入っているんです\nでも充電専用ケーブルは\nデータを流す線が物理的に入っていない\n線がないものはデータの抜きようがありませんよね\nだから何が刺さっていようが\nデータは絶対に盗まれないというわけです\n──── 対策その4・USBデータブロッカーを使う ────\n最後、4つ目は\nお気に入りのケーブルがあって\nそのまま使いたいという方向けの対策です\n「USBデータブロッカー」という小さな部品があります\n指先くらいの小さなアダプターで\nこれをUSBポートとケーブルの間に挟むだけ\nデータの通信を物理的に遮断してくれるんです\nこれも数百円で買えます\n特に旅行や出張が多い方\n防災リュックの中にも1個入れておくと安心ですよ\n━━━━━━━━━━━━━━━━━━━━\n■ 家の充電器も実は違法だった\n━━━━━━━━━━━━━━━━━━━━\nさて、ここまでで外で安全に充電する方法はバッチリですね\nただ、ここまで聞いて\n「外がそんなに怖いなら、もう家でしか充電しない」\nそう思った方もいらっしゃると思います\nその判断、半分は正解です\nでも実は、家での充電にも\n別の落とし穴があるんです\nしかもこちらは違法まで絡んでくる\nかなり深刻な話なんですね\nつまり外で対策をしている方も\n家でしか充電しないと決めた方も\n両方とも、ここからの話は必ず知っておいてください\nちなみに、さっきの対策1で紹介したモバイルバッテリー\nそれから対策2で紹介したコンセント直結用の充電器\nこれらにもあてはまる話ですので\n合わせて覚えておいてくださいね\n皆さんの充電器には\n「PSE」という丸い印、書かれていますか？\n実はこのPSEマークというのは\n電気用品安全法という日本の法律で\n日本国内で売っていいと認められた電気製品にだけ\n付けられるマークなんです\nつまり、PSEマークがない充電器を売ること\nこれは法律違反、完全に違法なんですね\n【テロップ表示】\n※罰則：法人は1億円以下の罰金\n個人は1年以下の懲役または100万円以下の罰金\nこれくらい、かなり厳しい罰則が定められているんです\n特に注意してほしいのが、ネット通販で売っている\n500円とか1,000円くらいの激安充電器\n純正品より何分の1かの値段で買えるから\nお得だと思って買ってしまう方が多いんですが\nこの中にはPSEマークがない違法品が\n紛れ込んでいることがよくあるんです\nなぜここまで厳しく義務化されているのかというと\n寝ている間に枕の下で充電器が発火した\nバッテリーが膨らんでスマホが破裂した\nコンセントから火花が出て家が全焼してしまった\nこのような火災事故が実際に起きているからです\n公式なデータ（経済産業省）によると\nモバイルバッテリーやスマホの充電器などによる事故は\n2020年から2024年までの5年間で\n1,860件報告されています\nそのうちの約85パーセント\n1,587件が火災事故に発展しているんです\nとても危険ですよね\nですので、お家の充電器はもちろん\nさっき紹介したモバイルバッテリーや\n持ち歩く用の充電アダプターも\nすべてPSEマーク付きの正規品かどうか\n動画を見終わったら必ず確認してみてください\nもしなければ、火災の原因になる可能性があるので\n今日中に買い替えていただくことを強くおすすめします\n━━━━━━━━━━━━━━━━━━━━\n■ エンディング\n━━━━━━━━━━━━━━━━━━━━\nそして、今日の内容\nぜひご家族やお友達にもシェアしてあげてください\n知っているだけで防げる被害です\n特に、普段スマホをよく使う方ほど\n被害に遭いやすいので\n周りの方にも教えてあげてくださいね\nこれからもスマホを安心して使えるような情報をお届けしていきますので\nいいねとチャンネル登録もお願いしますね\nそれでは、また次の動画でお会いしましょう", "feedback": "1枚目の文言がいいと思う！\n気持ち文字と矢印、コンセントの画像を下に下げたいけど\nまたこれは対面でFBします！\n違法になりました系で注意したいのが\n実際には違法になってはいないこと\nけどコメント欄をみると釣りサムネにも関わらず\n全然荒れていなくてむしろ共感の嵐になっている\nおそらく、最後まで動画をみた人は\n違法になったという情報以上に動画の中身が良くて満足してるから\n釣りサムネに気づいていないような気がする\nだからこのスマホでもそれを意識して\n釣りサムネにはならないにはどうしたらいいか？\n冒頭の台本をどう書いたら釣りサムネにならないか？\nとかとか考えながら台本を書いてみて欲しい！\nただ、今回に関してはPSEマークつけてない充電器は違法\nっていう内容があるから\n釣りにはならなさそう！\nなので台本を作る時は\n共感性の取れる内容+PSE違法の台本\nこの2つはマストで意識して作ってみて欲しいです！\n==========後藤添削==============================="}, {"doc_heading": "企画3　高額請求　Youtube", "title": "【絶対やって】YouTubeに潜むシニアを狙った高額請求の手口とその対処法", "thumb_copy": "", "target": "", "script": "①冒頭フック\nYouTubeを普通に見ているだけで高額請求が来た実例と金額提示。\n今すぐデータ使用量を確認させる参加型で自分ごと化。\n②\n高額請求の経路1：ギガ消費\n自動高画質設定でモバイル通信が爆速で消える仕組み。\n→対策：画質設定をオフ\n③高額請求の経路2：詐欺広告→不審アプリ→毎月課金\n視聴中に出てくる偽アップデート通知の仕組みと被害。\n→対策：広告の見分け方・ブロック方法\n④まとめ\nこの2つをやっておくだけで\n今月から高額請求のリスクが大幅に下がる。\n🔸訴求案1~6\n「オンにして」よりも「オフにして」の方が\n「自分は何もしていないのに、勝手にやられている」という感覚が\n焦りと怒りを同時に生むので『今すぐ止めなきゃ』という行動衝動が起きやすい\n（ジャンル参入時に言語化して明らかになった点です！）\n⬇︎\n1.\n今すぐオフにして！\nYoutubeから\n個人情報ダダ漏れ…\n2.\n今すぐオフにして！\nYoutubeから\n個人情報が丸見えです\nz\n め\nオフにしておく方が安心です\nまた犯罪者にこのデータが渡ると\nあなたの関心や悩みまで\n特定されてしまいます\n上の管理をタップして\nオフにするを選択しましょう\n視聴履歴と検索履歴\nそれぞれ個別にオフにできます\n【YouTube設定③：名前・本名の変更】\n次に自分のアカウントの状態を確認してみましょう\n右下のマイページ\n自分のアイコンをタップしてください\nこの画面に表示されている名前を見てください\nこれ、本名になっていませんか？\nもしそうなら\n本名が全世界に公開されている状態です\nGoogle検索するだけで\nYouTubeのアカウントが\n一瞬で特定されてしまいますから\n犯罪者のターゲットにされる前に\nチャンネルを表示を押して\n右側のペンマークをタップ\nここでニックネームに変更しておきましょう\n自分のチャンネルを作った覚えがないのに…？\nという方も多いと思いますが\n過去に1度でも\n誰かの動画にコメントをしたことがある方は\nその時点で自動的にチャンネルが\n作られているんです\nこの変更をしたことで\nGoogleアカウントの名前も\n変わってしまうのでは…？\nと思う方は安心してください\n別々に設定できるようになっていますからね\nYouTubeアカウントの名前の変更は\n14日間で2回まで可能です\nこれで過去にしたコメントも\n全て新しい名前に変わりますから\n変更できた方は\n一緒に次に進みましょう\n【YouTube設定④：登録チャンネルの公開設定】\n次に同じ画面の下の方を見てください\nプライバシーという項目がありますよね？\nここがオンになっていると\nあなたが登録している全てのチャンネルが\n誰でも見られる状態になっています\n普段は真面目なニュースや\n料理チャンネルばかり見ていても\nこっそり登録している趣味のチャンネルや\nちょっと恥ずかしいチャンネルまで\n全部バレてしまいます\nさらに犯罪者はこの情報を使って\nあなたの関心や生活パターンを\n把握しターゲットを絞ります\n必ず非公開に設定しておきましょう\nスイッチをタップして\n非公開状態にしておきましょう\n【YouTube設定⑤：再生リストの公開設定】\n次に2回戻って再生リストを確認します\n再生リストを作ったことがある方は\n特に注意してください\n昔は初期設定で公開状態になっていたため\n自分では気づかないまま\n集めた動画が全部他の人から丸見えになっています\n自分だけのために集めた\n好きなアーティストの動画や\n人には言いにくい悩み、検索した動画まで\n全部公開されている可能性があります\nそれも誰かに見られているかもしれない…\nと思うとちょっと嫌ですよね\nリストの中に入って\n公開状態になっているものがあれば\nペンマークを押して\n今すぐ非公開に変更してください\n【Googleへの拡張】\nここまでできた方、本当によくできています\nでも実はまだ終わりじゃないんです\nさっき導入でお話しした通り\nYouTubeの対策だけだと\n今度はGoogle経由で\nあなたの個人情報が外部に送られ続けます\nこの2つをセットで対策して初めて\n犯罪者のターゲットリストから\n完全に外れることができますから\n引き続き一緒にやっていきましょう\n【Google設定①：Webとアプリのアクティビティ】\nYouTubeでのデータ画面から\nGoogle全体の情報と\n「ウェブとアプリのアクティビティ」\nという項目を確認してください\nここ実はYouTubeの設定ではなく\nGoogle全体の設定になっています\nこれがオンだと\nGoogleの検索履歴\nどのサイトを見たか\n今どこにいるかの位置情報まで\n全てGoogleのサーバーに\n保存され続けています\n例えばGoogleで旅行先を調べたら\nその後YouTubeを開いても\n旅行の広告ばかり出てくる\nあの現象もここが原因です\nGoogleがこの情報を学習することで\nおすすめの精度が上がるという\nメリットはありますが\n自分のプライバシーな情報まで\n学習させたくないという方や\n犯罪者にこのデータが渡るリスクを\n減らしたい方はオフにしておきましょう\n中に入って\nWebとアプリのアクティビティを\n「オフ」にします\n過去の記録も全て消したい方は\n「オフにしてアクティビティを削除」を選んでください\nただし過去のデータを消すと\nこれまで学習した情報がリセットされるため\nおすすめ精度が下がる可能性があります\n【Google設定②：統計情報】\n次は戻って「全般」をタップしてください\n一番下に「統計情報 const KK_KEY = 'yt_kikaku_v1';
const SEEDED_KEY = 'yt_kikaku_seeded';

function kkEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kkAttr(s){ return kkEsc(s).replace(/"/g,'&quot;'); }
function kkLoad(){ try{ return JSON.parse(localStorage.getItem(KK_KEY)||'[]'); }catch(e){ return []; } }
function kkSave(arr){ localStorage.setItem(KK_KEY, JSON.stringify(arr)); }
function kkUid(){ return 'k'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function togglePdca(){
  const b=document.getElementById('pdca-body'), t=document.getElementById('pdca-toggle');
  if(!b) return;
  const c=b.classList.toggle('collapsed');
  if(t) t.textContent = c ? '▼ 開く' : '▲ 閉じる';
}

function blankKikaku(){
  return { id:kkUid(), status:'plan', title:'', thumb_copy:'', target:'',
    refs:[], script:'', feedback:'', my_url:'', my_id:'', published:'',
    review:{ views:'', impressions:'', ctr:'', retention:'', hypothesis:'',
             result:'', lesson_thumb:'', lesson_title:'', lesson_script:'', next:'' } };
}

function newKikaku(){
  const arr=kkLoad(); const k=blankKikaku(); arr.unshift(k); kkSave(arr); renderKikaku();
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function newKikakuFromOpp(idx){
  const o = OPPS && OPPS[idx]; if(!o) return;
  const arr=kkLoad(); const k=blankKikaku();
  k.target = o.label + '（平均' + Math.round((o.avg_views||0)/10000) + '万再生 / 投稿空白' + (o.gap_days||0) + '日 / 競合' + (o.total_videos||0) + '本）';
  k.refs = (o.refs||[]).map(r=>({ title:r.title||'', url: r.id ? ('https://www.youtube.com/watch?v='+r.id) : '' }));
  arr.unshift(k); kkSave(arr); renderKikaku();
  // PDCAを開いてスクロール
  const body=document.getElementById('pdca-body'); if(body){ body.classList.remove('collapsed'); const t=document.getElementById('pdca-toggle'); if(t)t.textContent='▲ 閉じる'; }
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function kkFind(id){ return kkLoad().find(k=>k.id===id); }

function upd(id, path, val){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  const parts=path.split('.'); let o=k;
  for(let i=0;i<parts.length-1;i++){ if(o[parts[i]]==null)o[parts[i]]={}; o=o[parts[i]]; }
  o[parts[parts.length-1]]=val; kkSave(arr);
}

function setStatus(id){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.status = k.status==='posted' ? 'plan' : 'posted'; kkSave(arr); renderKikaku();
}

function deleteKikaku(id){
  if(!confirm('この企画を削除しますか？')) return;
  kkSave(kkLoad().filter(k=>k.id!==id)); renderKikaku();
}

function addRef(id){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.refs=k.refs||[]; k.refs.push({title:'',url:''}); kkSave(arr); renderKikaku();
}
function delRef(id,i){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k) return;
  k.refs.splice(i,1); kkSave(arr); renderKikaku();
}
function updRef(id,i,field,val){
  const arr=kkLoad(); const k=arr.find(x=>x.id===id); if(!k||!k.refs[i]) return;
  k.refs[i][field]=val; kkSave(arr);
}

// マイチャンネル動画クリック → 紐づく企画を作成 or 既存へ
function linkMyVideo(vid){
  const v=(MYCH.videos||[]).find(x=>x.id===vid); if(!v) return;
  let arr=kkLoad(); let k=arr.find(x=>x.my_id===vid);
  if(!k){
    k=blankKikaku(); k.status='posted'; k.title=v.title; k.my_id=vid;
    k.my_url='https://www.youtube.com/watch?v='+vid; k.published=v.published_at;
    k.review.views=String(v.view_count||'');
    arr.unshift(k); kkSave(arr);
  }
  renderKikaku();
  const body=document.getElementById('pdca-body'); if(body){ body.classList.remove('collapsed'); const t=document.getElementById('pdca-toggle'); if(t)t.textContent='▲ 閉じる'; }
  const el=document.getElementById('kk-'+k.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function renderMyChannel(){
  const wrap=document.getElementById('pdca-mych'); if(!wrap) return;
  const vids=(MYCH&&MYCH.videos)||[];
  if(!vids.length){ wrap.innerHTML='<div class="kk-empty">まだ動画がありません</div>'; return; }
  const have=new Set(kkLoad().map(k=>k.my_id).filter(Boolean));
  wrap.innerHTML=vids.map(v=>{
    const badge = have.has(v.id)
      ? '<span class="pmv-badge has">✓ 振り返りあり</span>'
      : '<span class="pmv-badge no">＋ 振り返りを作成</span>';
    return '<div class="pmv" onclick="linkMyVideo(\''+v.id+'\')">'+
      '<img src="'+kkAttr(v.thumbnail)+'" loading="lazy" onerror="this.style.visibility=\'hidden\'">'+
      '<div class="pmv-b"><div class="pmv-t">'+kkEsc(v.title)+'</div>'+
      '<div class="pmv-m">▶ '+(v.view_count||0).toLocaleString()+'回 ｜ '+kkEsc(v.published_at)+'</div>'+
      badge+'</div></div>';
  }).join('');
}

function refRow(id,i,r){
  return '<div class="kk-ref">'+
    '<input placeholder="参考動画タイトル" value="'+kkAttr(r.title)+'" onchange="updRef(\''+id+'\','+i+',\'title\',this.value)">'+
    '<input placeholder="URL" value="'+kkAttr(r.url)+'" onchange="updRef(\''+id+'\','+i+',\'url\',this.value)">'+
    '<button class="kk-ref-del" onclick="delRef(\''+id+'\','+i+')" title="削除">✕</button></div>';
}

function ta(id,path,val,ph,cls){
  return '<textarea class="'+(cls||'')+'" placeholder="'+kkAttr(ph)+'" onchange="upd(\''+id+'\',\''+path+'\',this.value)">'+kkEsc(val)+'</textarea>';
}
function inp(id,path,val,ph){
  return '<input placeholder="'+kkAttr(ph)+'" value="'+kkAttr(val)+'" onchange="upd(\''+id+'\',\''+path+'\',this.value)">';
}

function anFor(k){
  if(!MYAN || !MYAN.videos) return null;
  const id = k.my_id || (k.my_url ? (k.my_url.split('v=')[1]||'').split('&')[0] : '');
  return id ? MYAN.videos[id] : null;
}

function kkApplyAnalytics(id){
  const k=kkFind(id); const a=k?anFor(k):null; if(!a) return;
  upd(id,'review.views',String(a.views));
  upd(id,'review.retention',String(a.retention));
  renderKikaku();
}

function mfield(label, inputHtml){
  return '<div class="kk-mf"><label>'+label+'</label>'+inputHtml+'</div>';
}

// 実測値ブロック（常時表示）: 自動取得分 + 手入力分(CTR/インプレ)
function anPanel(k){
  const a=anFor(k);
  const rv=k.review||{};
  let h='<div class="kk-an"><div class="kk-an-head">📊 実測値';
  if(a){
    const up=(MYAN&&MYAN.updated_at)||'';
    h+='<span class="kk-an-auto">自動取得・'+kkEsc(up)+'</span>';
    h+='</div><div class="kk-an-grid">'+
      '<span><b>'+(a.views||0).toLocaleString()+'</b><small>再生数</small></span>'+
      '<span><b>'+a.retention+'%</b><small>視聴維持率</small></span>'+
      '<span><b>'+a.avg_duration_sec+'秒</b><small>平均視聴</small></span>'+
      '<span><b>'+(a.watch_minutes||0).toLocaleString()+'分</b><small>総視聴時間</small></span>'+
      '<span><b>👍'+(a.likes||0)+'</b><small>高評価</small></span>'+
      '<span><b>💬'+(a.comments||0)+'</b><small>コメント</small></span>'+
      '<span><b>+'+(a.subs_gained||0)+'</b><small>登録者増</small></span>'+
    '</div>';
  } else {
    h+='</div>';
  }
  // 手入力ブロック（CTR・インプレはAPI非公開のためStudioから）
  h+='<div class="kk-an-manual"><div class="kk-an-mlabel">🖊 YouTube Studioから手入力（API非公開）</div><div class="kk-an-mgrid">';
  h+=mfield('インプレッション', inp(k.id,'review.impressions',rv.impressions,'80000'));
  h+=mfield('クリック率 CTR(%)', inp(k.id,'review.ctr',rv.ctr,'4.5'));
  if(!a){
    h+=mfield('再生数', inp(k.id,'review.views',rv.views,'12000'));
    h+=mfield('視聴維持率(%)', inp(k.id,'review.retention',rv.retention,'35'));
  }
  h+='</div></div></div>';
  return h;
}

        (posted?'✅ 投稿済み':'📝 企画中')+'</span>'+
      '<input class="kk-title-in" placeholder="動画タイトル（案）" value="'+kkAttr(k.title)+'" onchange="upd(\''+k.id+'\',\'title\',this.value)">'+
      '<button class="kk-del" onclick="deleteKikaku(\''+k.id+'\')">🗑 削除</button>'+
    '</div>'+
    '<div class="kk-body">'+
      // 左カラム: 企画
      '<div class="kk-col">'+
        '<div class="kk-sec">🎯 企画（Plan）</div>'+
        '<div class="kk-field"><label>狙ったチャンス・根拠</label>'+ta(k.id,'target',k.target,'例: LINE×乗っ取り（平均137万再生 / 投稿空白125日）','')+'</div>'+
        '<div class="kk-field"><label>サムネ文言案</label>'+ta(k.id,'thumb_copy',k.thumb_copy,'例: 知らないと乗っ取られる','')+'</div>'+
        '<div class="kk-field"><label>参考にした動画</label><div class="kk-refs">'+refsHtml+
          '<button class="kk-ref-add" onclick="addRef(\''+k.id+'\')">＋ 参考動画を追加</button></div></div>'+
        '<div class="kk-field"><label>台本</label>'+ta(k.id,'script',k.script,'台本をここに貼り付け…','sc')+'</div>'+
        '<div class="kk-field kk-fb"><label>📝 添削・フィードバック（赤文字＝改善版）</label>'+ta(k.id,'feedback',k.feedback,'ドキュメントの赤文字（添削）がここに入ります','sc')+'</div>'+
        '<div class="kk-field"><label>自分の動画URL</label>'+inp(k.id,'my_url',k.my_url,'https://youtube.com/watch?v=...')+'</div>'+
        '<div class="kk-field"><label>投稿日</label>'+inp(k.id,'published',k.published,'2026-06-10')+'</div>'+
      '</div>'+
      // 右カラム: 振り返り
      '<div class="kk-col">'+
        anPanel(k)+
        '<div class="kk-sec review">📝 投稿1週間後の振り返り（Check / Act）</div>'+
        '<div class="kk-field"><label>仮説（なぜ伸びる/伸びたと思ったか）</label>'+ta(k.id,'review.hypothesis',rv.hypothesis,'需要が高く競合が止まっていたから…','')+'</div>'+
        '<div class="kk-field"><label>実際どうだったか</label>'+ta(k.id,'review.result',rv.result,'想定より伸びた/伸びなかった理由…','')+'</div>'+
        '<div class="kk-field"><label>🖼 サムネの改善点</label>'+ta(k.id,'review.lesson_thumb',rv.lesson_thumb,'','')+'</div>'+
        '<div class="kk-field"><label>📝 タイトルの改善点</label>'+ta(k.id,'review.lesson_title',rv.lesson_title,'','')+'</div>'+
        '<div class="kk-field"><label>🎬 台本の改善点</label>'+ta(k.id,'review.lesson_script',rv.lesson_script,'','')+'</div>'+
        '<div class="kk-field"><label>➡️ 次にやること</label>'+ta(k.id,'review.next',rv.next,'','')+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// タイトル類似でマイチャンネル動画を探す（bigram Jaccard）
function _bg(s){ s=(s||'').replace(/[\s　【】\[\]！!？?…・]/g,''); const o=new Set(); for(let i=0;i<s.length-1;i++)o.add(s.slice(i,i+2)); return o; }
function matchMyVideo(title){
  const vids=(MYCH&&MYCH.videos)||[]; const a=_bg(title); if(!a.size) return null;
  let best=null, bestS=0;
  vids.forEach(v=>{ const b=_bg(v.title); let inter=0; a.forEach(x=>{ if(b.has(x))inter++; });
    const uni=a.size+b.size-inter; const s=uni?inter/uni:0; if(s>bestS){bestS=s;best=v;} });
  return bestS>=0.30 ? best : null;
}

// 企画ドキュメントのシードを取り込む。
// ドキュメント由来の項目(タイトル/サムネ/根拠/台本/添削)は常に同期、
// 振り返り(CTR・仮説等)やrefsは保持。削除した企画は復活させない。
function seedKikaku(){
  if(!SEED || !SEED.length) return;
  const arr=kkLoad();
  let seeded; try{ seeded=new Set(JSON.parse(localStorage.getItem(SEEDED_KEY)||'[]')); }catch(e){ seeded=new Set(); }
  let changed=false;
  SEED.forEach(s=>{
    const key='doc:'+(s.doc_heading||s.title||'');
    const ex=arr.find(k=>k.doc_key===key);
    if(ex){
      // ドキュメント由来フィールドを同期（振り返りは保持）
      if(s.title) ex.title=s.title;
      ex.thumb_copy=s.thumb_copy||'';
      ex.target=s.target||'';
      ex.script=s.script||'';
      ex.feedback=s.feedback||'';
      changed=true;
    } else if(!seeded.has(key)){           // 未取り込みなら新規作成（削除済みは復活させない）
      const k=blankKikaku();
      k.doc_key=key;
      k.title=s.title || s.doc_heading || '';
      k.thumb_copy=s.thumb_copy||'';
      k.target=s.target||'';
      k.script=s.script||'';
      k.feedback=s.feedback||'';
      const mv=matchMyVideo(s.title);
      if(mv){ k.status='posted'; k.my_id=mv.id; k.my_url='https://www.youtube.com/watch?v='+mv.id; k.published=mv.published_at; }
      arr.push(k); changed=true;
    }
    seeded.add(key);
  });
  if(changed) kkSave(arr);
  localStorage.setItem(SEEDED_KEY, JSON.stringify([...seeded]));
}

function renderKikaku(){
  const list=document.getElementById('pdca-list'); if(!list) return;
  const arr=kkLoad();
  const cnt=document.getElementById('pdca-count');
  if(cnt) cnt.textContent = arr.length ? (arr.length+'件の企画') : '';
  if(!arr.length){ list.innerHTML='<div class="kk-empty">企画がまだありません。「🎯 狙い目ランキング」の<b>✏️ この企画で作る</b>、上の投稿動画、または「＋ 新しい企画を追加」から始めましょう。</div>'; renderMyChannel(); return; }
  list.innerHTML=arr.map(kkCard).join('');
  renderMyChannel();
}

function exportKikaku(){
  const blob=new Blob([JSON.stringify(kkLoad(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='kikaku_pdca_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importKikaku(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(Array.isArray(d)){ if(confirm('読み込むと現在の企画リストを置き換えます。よろしいですか？')){ kkSave(d); renderKikaku(); } } }catch(err){ alert('読み込み失敗: '+err); } };
  r.readAsText(f); e.target.value='';
}

// メインページの「この企画で作る」から渡されたチャンスを取り込む
function applyPendingOpp(){
  const raw=localStorage.getItem('yt_pending_opp'); if(!raw) return;
  localStorage.removeItem('yt_pending_opp');
  let o; try{ o=JSON.parse(raw); }catch(e){ return; }
  const arr=kkLoad(); const k=blankKikaku();
  k.target=o.label+'（平均'+Math.round((o.avg_views||0)/10000)+'万再生 / 投稿空白'+(o.gap_days||0)+'日 / 競合'+(o.total_videos||0)+'本）';
  k.refs=(o.refs||[]).map(r=>({title:r.title||'', url: r.id ? ('https://www.youtube.com/watch?v='+r.id) : ''}));
  arr.unshift(k); kkSave(arr);
}

applyPendingOpp();
seedKikaku();
renderKikaku();
</script></body></html>
